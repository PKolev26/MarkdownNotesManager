name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild MarkdownNotesManager.sln /t:Restore /p:Configuration=Release

      - name: Build
        run: msbuild MarkdownNotesManager.sln /p:Configuration=Release

      - name: Run unit tests
        run: dotnet test MarkdownNotesManager.Tests\MarkdownNotesManager.Tests.csproj --no-build --configuration Release
